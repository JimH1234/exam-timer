<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OneSchool Global Exam Timer</title>
<style>
  :root{
    --bg:#050505; --panel:#101010; --line:#3b3b3b; --text:#f4f4f4; --muted:#bdbdbd;
    --normal:#6FCF70; --amber:#F2C94C; --red:#EB5757; --button:#f3f3f3; --buttonText:#000;
    --osg-gold:#F5A800; --osg-purple:#3B1B67;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial, Helvetica, sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
  .settings{display:grid;grid-template-columns: 230px 1fr 112px 1fr 112px auto auto auto;gap:14px;align-items:end;padding:16px 22px;background:#181818;border-bottom:3px solid var(--osg-gold);}
  .brand{align-self:center;display:flex;align-items:center;gap:10px;min-width:0;}
  .brand img{height:50px;width:auto;display:block;background:#fff;border-radius:6px;padding:4px 8px;}
  .brand-mini{display:flex;align-items:center;gap:10px;margin-right:auto;}
  .brand-mini img{height:42px;width:auto;background:#fff;border-radius:5px;padding:3px 7px;}
  .mini-title{font-size:16px;color:#d8d8d8;font-weight:700;white-space:nowrap;}
  .field label{display:block;color:#ddd;font-size:16px;margin-bottom:7px;}
  input{width:100%;background:#000;color:#fff;border:1px solid #555;border-radius:10px;font-size:22px;padding:13px 15px;outline:none;}
  input:focus{border-color:var(--osg-gold);box-shadow:0 0 0 2px rgba(245,168,0,.18);}
  button{border:0;border-radius:12px;padding:15px 21px;font-size:21px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .primary{background:var(--button);color:var(--buttonText)}
  .secondary{background:#333;color:#fff;border:1px solid #555}
  .secondary:hover,.primary:hover{outline:2px solid rgba(245,168,0,.35)}
  .settings.hidden{display:none;}
  .topbar{display:none;align-items:center;padding:10px 18px;background:#181818;border-bottom:3px solid var(--osg-gold);gap:10px;}
  .topbar button{padding:11px 17px;font-size:17px;}
  .topbar.visible{display:flex;}
  .stage{height:calc(100vh - 132px);display:grid;grid-template-columns: 1.15fr .85fr 1.15fr;gap:24px;padding:32px 30px 30px;}
  body.running .stage{height:calc(100vh - 65px);}
  body.running.settings-hidden .stage{height:calc(100vh - 65px);padding-top:30px;}
  .card{background:var(--panel);border:3px solid var(--line);border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-width:0;overflow:hidden;padding:26px;}
  .exam.card{border-color:#3c3c3c;}
  .label{font-size:clamp(28px,3.2vw,50px);font-weight:800;line-height:1.05;margin-bottom:34px;max-width:100%;white-space:nowrap;}
  .count{font-size:clamp(98px,11.2vw,180px);font-weight:900;line-height:.9;color:var(--normal);letter-spacing:-5px;white-space:nowrap;}
  .status{font-size:clamp(18px,1.45vw,26px);font-weight:800;color:var(--muted);margin-top:24px;}
  .endtime{font-size:clamp(16px,1.25vw,22px);font-weight:700;color:var(--muted);margin-top:12px;}
  .clock-title{font-size:clamp(22px,2.15vw,34px);font-weight:800;color:var(--muted);margin-bottom:30px;white-space:nowrap;}
  .clock-time{font-size:clamp(60px,5.8vw,92px);font-weight:900;line-height:1;white-space:nowrap;color:#fff;}
  .clock-date{font-size:clamp(16px,1.5vw,25px);font-weight:700;color:var(--muted);margin-top:28px;line-height:1.25;}
  .amber{color:var(--amber)!important}.red{color:var(--red)!important}.finished{color:var(--red)!important;font-size:clamp(50px,5.2vw,86px);letter-spacing:0;white-space:normal;}
  .watermark{position:fixed;right:18px;bottom:10px;color:#555;font-size:13px;font-weight:700;opacity:.55;}
  @media (max-width: 1200px){.settings{grid-template-columns:190px 1fr 100px 1fr 100px;}.settings button{font-size:18px;padding:12px 14px}.brand img{height:42px}.stage{gap:16px;padding:22px;}.count{font-size:clamp(78px,9vw,132px)}}
</style>
</head>

    <button id="topPause" class="secondary">Pause</button>
    <button id="topReset" class="primary">Reset</button>
    <button id="showSettings" class="secondary">Show settings</button>
    <button id="topFull" class="secondary">Full screen</button>
  </section>
  <main class="stage">
    <article class="card exam"><div id="name1" class="label">Y10 Maths</div><div id="timer1" class="count">01:30</div><div id="status1" class="status">Ready</div><div id="end1" class="endtime">Ends --:--</div></article>
    <article class="card"><div class="clock-title">Current Time</div><div id="clock" class="clock-time">--:--</div><div id="date" class="clock-date">&nbsp;</div></article>
    <article class="card exam"><div id="name2" class="label">Y7 English</div><div id="timer2" class="count">01:00</div><div id="status2" class="status">Ready</div><div id="end2" class="endtime">Ends --:--</div></article>
  </main>
  <div class="watermark">OneSchool Global</div>
<script>
let running=false, paused=false, interval=null;
let exams=[{duration:90*60000, remaining:90*60000, end:null},{duration:60*60000, remaining:60*60000, end:null}];
let pauseStarted=null;
const $=id=>document.getElementById(id);
function pad(n){return String(n).padStart(2,'0')}
function fmt(ms){ms=Math.max(0,ms); const mins=Math.ceil(ms/60000); const h=Math.floor(mins/60); const m=mins%60; return `${pad(h)}:${pad(m)}`;}
function timeFmt(d){let h=d.getHours(), m=pad(d.getMinutes()); const ampm=h>=12?'PM':'AM'; let hh=h%12||12; return `${hh}:${m} ${ampm}`;}
function updateClock(){const n=new Date(); $('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`; $('date').textContent=n.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});}
function readSettings(){
  exams[0].duration=Math.max(1,Number($('mins1').value)||1)*60000; exams[0].remaining=exams[0].duration;
  exams[1].duration=Math.max(1,Number($('mins2').value)||1)*60000; exams[1].remaining=exams[1].duration;
  $('name1').textContent=$('label1').value||'Exam 1'; $('name2').textContent=$('label2').value||'Exam 2';
}
function draw(){
  for(let i=0;i<2;i++){
    const t=$('timer'+(i+1)), s=$('status'+(i+1)), e=$('end'+(i+1));
    t.className='count';
    if(running && !paused && exams[i].end) exams[i].remaining=exams[i].end-new Date();
    if(exams[i].remaining<=0){ t.textContent='FINISHED'; t.className='count finished'; s.textContent='Time is up'; }
    else { t.textContent=fmt(exams[i].remaining); s.textContent=running?(paused?'Paused':'Remaining'):'Ready'; if(exams[i].remaining<=5*60000)t.classList.add('red'); else if(exams[i].remaining<=15*60000)t.classList.add('amber'); }
    e.textContent=exams[i].end ? `Ends ${timeFmt(exams[i].end)}` : 'Ends --:--';
  }
}
function startTimers(){
  readSettings(); const now=new Date(); exams.forEach(ex=>ex.end=new Date(now.getTime()+ex.duration));
  running=true; paused=false; document.body.classList.add('running','settings-hidden'); $('settings').classList.add('hidden'); $('topbar').classList.add('visible');
  $('startBtn').textContent='Reset'; $('pauseBtn').disabled=false; $('pauseBtn').textContent='Pause'; $('topPause').textContent='Pause'; tick();
}
function resetTimers(){
  running=false; paused=false; exams.forEach(ex=>{ex.end=null; ex.remaining=ex.duration}); $('startBtn').textContent='Start'; $('pauseBtn').disabled=true; $('pauseBtn').textContent='Pause'; $('topPause').textContent='Pause'; document.body.classList.remove('running','settings-hidden'); $('settings').classList.remove('hidden'); $('topbar').classList.remove('visible'); readSettings(); draw();
}
function tick(){updateClock(); draw();}
$('startBtn').addEventListener('click',()=> running ? resetTimers() : startTimers());
function togglePause(){
  if(!running)return;
  if(!paused){paused=true; pauseStarted=new Date(); $('pauseBtn').textContent='Resume'; $('topPause').textContent='Resume'; draw();}
  else {const diff=new Date()-pauseStarted; exams.forEach(ex=>{if(ex.end)ex.end=new Date(ex.end.getTime()+diff)}); paused=false; $('pauseBtn').textContent='Pause'; $('topPause').textContent='Pause'; draw();}
}
$('pauseBtn').addEventListener('click',togglePause);
$('topPause').addEventListener('click',togglePause);
$('topReset').addEventListener('click',resetTimers);
$('topFull').addEventListener('click',()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen();});
$('showSettings').addEventListener('click',()=>{document.body.classList.remove('settings-hidden'); $('settings').classList.remove('hidden'); $('topbar').classList.remove('visible');});
$('fullBtn').addEventListener('click',()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen();});
['label1','label2','mins1','mins2'].forEach(id=>$(id).addEventListener('input',()=>{if(!running){readSettings();draw();}}));
interval=setInterval(tick,1000); readSettings(); tick();
</script>
</body>
